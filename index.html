<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>우리 집 숙제 마스터 (캘린더 모드)</title>
    <script src='https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.js'></script>
    <style>
        :root {
            --primary-color: #4A90E2;
            --success-color: #2ECC71;
            --school-color: #E67E22;
            --academy-color: #9B59B6;
            --bg-color: #F5F7FA;
        }
        body { font-family: 'Malgun Gothic', sans-serif; background-color: var(--bg-color); margin: 0; padding: 10px; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 800px; background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        
        /* 사용자 선택 탭 */
        .user-tabs { display: flex; gap: 8px; margin-bottom: 15px; }
        .tab-btn { flex: 1; padding: 12px; font-size: 16px; font-weight: bold; border: 2px solid #DDD; background: #FFF; border-radius: 10px; cursor: pointer; }
        .tab-btn.active { background: var(--primary-color); color: white; border-color: var(--primary-color); }

        .reward-board { background: #FFF9E6; border: 1px dashed #F1C40F; padding: 10px; border-radius: 10px; text-align: center; margin-bottom: 15px; font-weight: bold; color: #D35400; }
        
        /* 캘린더 스타일 커스텀 */
        #calendar { margin-bottom: 20px; max-height: 550px; }
        .fc-event { cursor: pointer; border: none !important; font-size: 0.85em; padding: 2px; }
        .event-completed { text-decoration: line-through; opacity: 0.6; }
        
        /* 숙제 리스트 팝업/영역 */
        .day-detail { background: #F9FAFB; padding: 15px; border-radius: 10px; border: 1px solid #E5E7EB; margin-top: 10px; }
        .selected-date-title { font-weight: bold; margin-bottom: 10px; color: #333; display: flex; justify-content: space-between; align-items: center; }
        
        .input-row { display: flex; gap: 8px; margin-bottom: 10px; }
        input[type="text"] { flex: 1; padding: 10px; border: 1px solid #DDD; border-radius: 6px; }
        .btn-add { padding: 10px 15px; background: var(--primary-color); color: white; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; }

        .todo-list { list-style: none; padding: 0; margin: 0; }
        .todo-item { display: flex; justify-content: space-between; align-items: center; padding: 10px; background: white; border: 1px solid #EEE; border-radius: 6px; margin-bottom: 5px; }
        .todo-item.completed { background: #F2F2F2; color: #888; }
        .todo-text { flex: 1; margin: 0 10px; }
        .badge { padding: 2px 5px; border-radius: 4px; font-size: 10px; color: white; font-weight: bold; }
        .badge.school { background: var(--school-color); }
        .badge.academy { background: var(--academy-color); }
        
        .actions button { border: none; padding: 5px 8px; border-radius: 4px; color: white; font-size: 12px; cursor: pointer; margin-left: 3px; }
        .btn-done { background: var(--success-color); }
        .btn-del { background: #BDC3C7; }
    </style>
</head>
<body>

<div class="container">
    <div class="user-tabs">
        <button id="btn-child1" class="tab-btn active" onclick="switchUser('child1')">첫째</button>
        <button id="btn-child2" class="tab-btn" onclick="switchUser('child2')">둘째</button>
    </div>
    
    <div class="reward-board">
        🪙 <span id="current-user-name">첫째</span> 코인: <span id="coin-count">0</span>개
    </div>

    <div id="calendar"></div>

    <div id="day-detail" class="day-detail">
        <div class="selected-date-title">
            <span id="selected-date-label">날짜를 선택하세요</span>
            <select id="new-category">
                <option value="school">학교</option>
                <option value="academy">학원</option>
            </select>
        </div>
        <div class="input-row">
            <input type="text" id="todo-input" placeholder="새 숙제 입력...">
            <button class="btn-add" onclick="addTodo()">등록</button>
        </div>
        <ul id="todo-list" class="todo-list"></ul>
    </div>
</div>

    let calendar;

            initialView: 'dayGridMonth',

            height: 'auto',

                updateSelectedDateLabel();
                renderDayList();

                // 이벤트를 클릭해도 해당 날짜 리스트를 보여줌
                selectedDate = info.event.startStr;
                updateSelectedDateLabel();
                renderDayList();
            }
        });
        calendar.render();
        updateSelectedDateLabel();
        fetchData();
        setInterval(fetchData, 5000); // 5초마다 동기화
    });

        currentUser = user;
        document.getElementById('btn-child1').classList.toggle('active', user === 'child1');
        document.getElementById('btn-child2').classList.toggle('active', user === 'child2');
        document.getElementById('current-user-name').innerText = (user === 'child1' ? '첫째' : '둘째');
        fetchData();
    }

        document.getElementById('selected-date-label').innerText = `📅 ${selectedDate} 숙제 리스트`;
    }
