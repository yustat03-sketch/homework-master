<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>우리 집 숙제 마스터 (형제 모드)</title>
    <style>
        :root {
            --primary-color: #4A90E2;
            --success-color: #2ECC71;
            --warning-color: #E67E22;
            --danger-color: #E74C3C;
            --bg-color: #F5F7FA;
        }
        body { font-family: 'Malgun Gothic', sans-serif; background-color: var(--bg-color); margin: 0; padding: 20px; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 650px; background: white; padding: 25px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h1 { text-align: center; color: #333; margin-bottom: 20px; }
        
        /* 사용자 선택 탭 */
        .user-tabs { display: flex; gap: 10px; margin-bottom: 20px; }
        .tab-btn { flex: 1; padding: 15px; font-size: 18px; font-weight: bold; border: 2px solid #DDD; background: #FFF; border-radius: 10px; cursor: pointer; transition: all 0.2s; }
        .tab-btn.active { background: var(--primary-color); color: white; border-color: var(--primary-color); }

        /* 코인 전광판 */
        .reward-board { background: #FFF9E6; border: 2px dashed #F1C40F; padding: 15px; border-radius: 10px; text-align: center; margin-bottom: 25px; font-size: 18px; font-weight: bold; color: #D35400; }
        .coin-count { color: #E67E22; font-size: 24px; }

        .input-form { display: flex; flex-direction: column; gap: 10px; margin-bottom: 25px; background: #F9FAFB; padding: 15px; border-radius: 10px; border: 1px solid #E5E7EB; }
        .input-row { display: flex; gap: 10px; }
        select, input, button { padding: 12px; border: 1px solid #DDD; border-radius: 8px; font-size: 15px; }
        input[type="text"] { flex: 1; }
        input[type="date"] { width: 140px; }
        .btn-add { background-color: var(--primary-color); color: white; border: none; font-weight: bold; width: 100%; }
        button:hover { opacity: 0.9; cursor: pointer; }
        
        .todo-list { list-style: none; padding: 0; }
        .todo-item { display: flex; justify-content: space-between; align-items: center; padding: 15px; background: #FCFCFC; border: 1px solid #EEE; border-radius: 8px; margin-bottom: 10px; }
        .todo-item.completed { background-color: #EDF7ED; border-color: var(--success-color); color: #888; }
        .todo-item.completed .todo-text { text-decoration: line-through; }
        .todo-info { display: flex; flex-direction: column; gap: 5px; }
        .todo-meta { display: flex; align-items: center; gap: 8px; }
        .badge { padding: 3px 6px; border-radius: 4px; font-size: 11px; font-weight: bold; color: white; }
        .badge.school { background-color: #E67E22; }
        .badge.academy { background-color: #9B59B6; }
        .dday { font-size: 12px; font-weight: bold; color: var(--danger-color); }
        .todo-text { font-size: 16px; font-weight: 500; }
        .actions button { padding: 8px 12px; font-size: 13px; margin-left: 5px; border: none; border-radius: 6px; color: white; font-weight: bold; }
        .btn-done { background-color: var(--success-color); }
        .btn-del { background-color: #BDC3C7; color: #333; }
    </style>
</head>
<body>

<div class="container">
    <h1>📝 우리 집 숙제 마스터</h1>

    <div class="user-tabs">
        <button class="tab-btn active" onclick="switchUser('child1')">첫째 (준우)</button>
        <button class="tab-btn" onclick="switchUser('child2')">둘째 (민우)</button>
    </div>
    
    <div class="reward-board">
        🪙 <span id="current-user-name">첫째</span>의 숙제 코인: <span id="coin-count" class="coin-count">0</span>개
    </div>
    
    <div class="input-form">
        <div class="input-row">
            <select id="category">
                <option value="school">학교</option>
                <option value="academy">학원</option>
            </select>
            <input type="text" id="todo-input" placeholder="어떤 숙제를 해야 하나요?">
        </div>
        <div class="input-row">
            <input type="date" id="due-date">
            <button class="btn-add" onclick="addTodo()">퀘스트 등록</button>
        </div>
    </div>

    <ul id="todo-list" class="todo-list"></ul>
</div>

<script>
    // ⚠️ 중요: 본인의 파이어베이스 프로젝트 ID로 변경해야 합니다!
    const FIREBASE_URL = "https://homework-db-6c830-default-rtdb.firebaseio.com"; 

    let currentUser = 'child1';
    const userNames = { child1: '첫째', child2: '둘째' };

    document.addEventListener('DOMContentLoaded', () => {
        document.getElementById('due-date').value = new Date().toISOString().substring(0, 10);
        fetchData(); // 시작할 때 데이터 실시간 동기화
        // 3초마다 자동으로 새 데이터를 불러와 아버님 폰과 아이들 폰이 동기화되도록 설정
        setInterval(fetchData, 3000); 
    });

    function switchUser(user) {
        currentUser = user;
        document.querySelectorAll('.tab-btn').forEach((btn, idx) => {
            btn.classList.toggle('active', (idx === 0 && user === 'child1') || (idx === 1 && user === 'child2'));
        });
        document.getElementById('current-user-name').innerText = userNames[user];
        fetchData();
    }

    // 서버에서 데이터 가져오기
    function fetchData() {
        fetch(`${FIREBASE_URL}${currentUser}.json`)
        .then(res => res.json())
        .then(data => {
            const coins = data ? data.coins || 0 : 0;
            const todos = data && data.todos ? Object.keys(data.todos).map(key => ({ id: key, ...data.todos[key] })) : [];
            
            // 마감일 정렬
            todos.sort((a, b) => new Date(a.dueDate) - new Date(b.dueDate));
            
            document.getElementById('coin-count').innerText = coins;
            
            const list = document.getElementById('todo-list');
            list.innerHTML = '';
            todos.forEach(todo => {
                const li = document.createElement('li');
                li.className = `todo-item ${todo.completed ? 'completed' : ''}`;
                
                const today = new Date(); today.setHours(0,0,0,0);
                const target = new Date(todo.dueDate); target.setHours(0,0,0,0);
                const diff = Math.ceil((target - today) / (1000*60*60*24));
                const ddayText = todo.completed ? '완료됨' : (diff === 0 ? '오늘까지!' : (diff < 0 ? `만료` : `D-${diff}`));

                li.innerHTML = `
                    <div class="todo-info">
                        <div class="todo-meta">
                            <span class="badge ${todo.category}">${todo.category === 'school' ? '학교' : '학원'}</span>
                            <span class="dday">${ddayText}</span>
                        </div>
                        <span class="todo-text">${todo.text}</span>
                    </div>
                    <div class="actions">
                        <button class="btn-done" onclick="toggleTodo('${todo.id}', ${todo.completed})">${todo.completed ? '취소' : '완료'}</button>
                        <button class="btn-del" onclick="deleteTodo('${todo.id}')">삭제</button>
                    </div>
                `;
                list.appendChild(li);
            });
        });
    }

    function addTodo() {
        const text = document.getElementById('todo-input').value.trim();
        const dueDate = document.getElementById('due-date').value;
        if (!text || !dueDate) return;

        const newTodo = {
            category: document.getElementById('category').value,
            text: text,
            dueDate: dueDate,
            completed: false
        };

        fetch(`${FIREBASE_URL}${currentUser}/todos.json`, {
            method: 'POST',
            body: JSON.stringify(newTodo)
        }).then(() => {
            document.getElementById('todo-input').value = '';
            fetchData();
        });
    }

    function toggleTodo(id, currentStatus) {
        const nextStatus = !currentStatus;
        
        // 코인 점수 계산을 위해 먼저 현재 코인을 조회
        fetch(`${FIREBASE_URL}${currentUser}/coins.json`)
        .then(res => res.json())
        .then(currentCoins => {
            let coins = currentCoins || 0;
            coins = nextStatus ? coins + 1 : Math.max(0, coins - 1);

            // 상태와 코인을 서버에 동시에 업데이트
            Promise.all([
                fetch(`${FIREBASE_URL}${currentUser}/todos/${id}.json`, { method: 'PATCH', body: JSON.stringify({ completed: nextStatus }) }),
                fetch(`${FIREBASE_URL}${currentUser}/coins.json`, { method: 'PUT', body: coins })
            ]).then(() => fetchData());
        });
    }

    function deleteTodo(id) {
        fetch(`${FIREBASE_URL}${currentUser}/todos/${id}.json`, { method: 'DELETE' })
        .then(() => fetchData());
    }
</script>
</body>
</html>
