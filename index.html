<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>우리 집 숙제 마스터 2.0</title>
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.15/index.global.min.js"></script>
    <style>
        :root {
            --primary-color: #4A90E2;
            --success-color: #2ECC71;
            --school-color: #E67E22;
            --academy-color: #9B59B6;
            --bg-color: #F1F5F9;
        }
        body { font-family: 'Malgun Gothic', sans-serif; background-color: var(--bg-color); margin: 0; padding: 15px; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 900px; background: white; padding: 25px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .user-tabs { display: flex; gap: 10px; }
        .tab-btn { padding: 10px 18px; font-weight: bold; border: 2px solid #DDD; background: white; border-radius: 10px; cursor: pointer; transition: 0.2s; }
        .tab-btn.active { background: var(--primary-color); color: white; border-color: var(--primary-color); }
        .reward-board { font-size: 17px; font-weight: bold; color: #D35400; background: #FFF9E6; padding: 10px 15px; border-radius: 10px; border: 1px dashed #F1C40F; }

        /* 캘린더 디자인: 높이를 고정하여 안보이는 현상 방지 */
        #calendar { background: white; padding: 10px; border-radius: 12px; border: 1px solid #E2E8F0; margin-bottom: 25px; min-height: 500px; }
        .fc-event { cursor: pointer; border: none !important; font-size: 0.85em; padding: 3px; border-radius: 4px; }
        .event-completed { text-decoration: line-through; opacity: 0.4; }

        .day-detail { background: #F8FAFC; padding: 20px; border-radius: 15px; border: 1px solid #E2E8F0; }
        .selected-date-title { font-weight: bold; margin-bottom: 15px; color: #334155; font-size: 1.1em; display: flex; justify-content: space-between; }
        
        .input-group { display: flex; gap: 8px; margin-bottom: 15px; }
        select, input { padding: 12px; border: 1px solid #CBD5E1; border-radius: 8px; font-size: 15px; }
        input[type="text"] { flex: 1; }
        .btn-add { background: var(--primary-color); color: white; border: none; padding: 0 20px; border-radius: 8px; font-weight: bold; cursor: pointer; }

        .todo-list { list-style: none; padding: 0; }
        .todo-item { display: flex; justify-content: space-between; align-items: center; padding: 12px; background: white; border: 1px solid #E2E8F0; border-radius: 8px; margin-bottom: 8px; }
        .todo-item.completed { background: #F1F5F9; color: #94A3B8; }
        .todo-item.completed span { text-decoration: line-through; }
        .badge { padding: 3px 7px; border-radius: 5px; font-size: 11px; color: white; font-weight: bold; margin-right: 10px; }
        .badge.school { background: var(--school-color); }
        .badge.academy { background: var(--academy-color); }
        
        .btn-done { background: var(--success-color); border: none; padding: 6px 12px; border-radius: 5px; color: white; font-weight: bold; cursor: pointer; }
        .btn-del { background: #94A3B8; border: none; padding: 6px 12px; border-radius: 5px; color: white; cursor: pointer; margin-left: 5px; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <div class="user-tabs">
            <button id="btn-child1" class="tab-btn active" onclick="switchUser('child1')">첫째</button>
            <button id="btn-child2" class="tab-btn" onclick="switchUser('child2')">둘째</button>
        </div>
        <div class="reward-board">🪙 <span id="current-user-name">첫째</span> 코인: <span id="coin-count">0</span></div>
    </div>

    <div id="calendar"></div>

    <div class="day-detail" id="day-detail">
        <div class="selected-date-title">
            <span id="selected-date-label">날짜를 클릭해 보세요!</span>
        </div>
        <div class="input-group">
            <select id="new-category">
                <option value="school">학교</option>
                <option value="academy">학원</option>
            </select>
            <input type="text" id="todo-input" placeholder="이 날 할 숙제를 입력하세요...">
            <button class="btn-add" onclick="addTodo()">등록</button>
        </div>
        <ul id="todo-list" class="todo-list"></ul>
    </div>
</div>

<script>
    // ⚠️ 아버님의 Firebase URL을 다시 확인해서 꼭 넣어주세요!
    const FIREBASE_URL = "https://homework-db-6c830-default-rtdb.firebaseio.com/"; 

    let currentUser = 'child1';
    let selectedDate = new Date().toISOString().substring(0, 10);
    let calendar;
    let allTodos = [];

    // 전역 함수: 버튼이 즉시 인식할 수 있도록 밖으로 꺼냄
    function switchUser(user) {
        currentUser = user;
        document.getElementById('btn-child1').classList.toggle('active', user === 'child1');
        document.getElementById('btn-child2').classList.toggle('active', user === 'child2');
        document.getElementById('current-user-name').innerText = (user === 'child1' ? '첫째' : '둘째');
        fetchData();
    }

    function addTodo() {
        const input = document.getElementById('todo-input');
        const text = input.value.trim();
        if (!text) { alert('내용을 입력해 주세요!'); return; }
        const newTodo = {
            category: document.getElementById('new-category').value,
            text: text,
            dueDate: selectedDate,
            completed: false
        };
        fetch(`${FIREBASE_URL}${currentUser}/todos.json`, { method: 'POST', body: JSON.stringify(newTodo) })
        .then(() => { input.value = ''; fetchData(); });
    }

    function toggleTodo(id, currentStatus) {
        const nextStatus = !currentStatus;
        fetch(`${FIREBASE_URL}${currentUser}/coins.json`).then(r => r.json()).then(currentCoins => {
            let coins = currentCoins || 0;
            coins = nextStatus ? coins + 1 : Math.max(0, coins - 1);
            Promise.all([
                fetch(`${FIREBASE_URL}${currentUser}/todos/${id}.json`, { method: 'PATCH', body: JSON.stringify({ completed: nextStatus }) }),
                fetch(`${FIREBASE_URL}${currentUser}/coins.json`, { method: 'PUT', body: coins })
            ]).then(() => fetchData());
        });
    }

    function deleteTodo(id) {
        if(!confirm('삭제할까요?')) return;
        fetch(`${FIREBASE_URL}${currentUser}/todos/${id}.json`, { method: 'DELETE' }).then(() => fetchData());
    }

    function fetchData() {
        fetch(`${FIREBASE_URL}${currentUser}.json`).then(r => r.json()).then(data => {
            const coins = data ? data.coins || 0 : 0;
            allTodos = data && data.todos ? Object.keys(data.todos).map(k => ({ id: k, ...data.todos[k] })) : [];
            document.getElementById('coin-count').innerText = coins;
            
            const events = allTodos.map(t => ({
                id: t.id, title: t.text, start: t.dueDate,
                backgroundColor: t.category === 'school' ? '#E67E22' : '#9B59B6',
                className: t.completed ? 'event-completed' : ''
            }));
            calendar.removeAllEvents();
            calendar.addEventSource(events);
            renderDayList();
        });
    }

    function renderDayList() {
        const listEl = document.getElementById('todo-list');
        listEl.innerHTML = '';
        const dayTodos = allTodos.filter(t => t.dueDate === selectedDate);
        document.getElementById('selected-date-label').innerText = `📅 ${selectedDate} 숙제 리스트`;
        if (dayTodos.length === 0) {
            listEl.innerHTML = '<li style="text-align:center; color:#94A3B8; padding:15px;">숙제가 없습니다.</li>';
            return;
        }
        dayTodos.forEach(t => {
            const li = document.createElement('li');
            li.className = `todo-item ${t.completed ? 'completed' : ''}`;
            li.innerHTML = `<div><span class="badge ${t.category}">${t.category==='school'?'학교':'학원'}</span><span>${t.text}</span></div>
                <div><button class="btn-done" onclick="toggleTodo('${t.id}',${t.completed})">${t.completed?'취소':'체크'}</button>
                <button class="btn-del" onclick="deleteTodo('${t.id}')">삭제</button></div>`;
            listEl.appendChild(li);
        });
    }

    // 페이지 로딩 시 달력 초기화
    document.addEventListener('DOMContentLoaded', function() {
        const calendarEl = document.getElementById('calendar');
        calendar = new FullCalendar.Calendar(calendarEl, {
            initialView: 'dayGridMonth',
            locale: 'ko',
            height: 580,
            headerToolbar: { left: 'prev,next today', center: 'title', right: '' },
            dateClick: function(info) {
                selectedDate = info.dateStr;
                renderDayList();
            }
        });
        calendar.render();
        fetchData();
        setInterval(fetchData, 8000); // 8초 자동 동기화
    });
</script>
</body>
</html>
