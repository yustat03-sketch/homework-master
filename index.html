<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🧸 우리 아이 숙제 마스터 V5.2 (2주 달력)</title>
    <link href="https://fonts.googleapis.com/css2?family=Dongle:wght@400;700&family=Nanum+Gothic:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.15/index.global.min.js"></script>
    <style>
        :root {
            --primary-color: #bae6fd;
            --accent-color: #fde68a;
            --school-color: #fb923c;
            --academy-color: #a78bfa;
            --text-color: #334155;
            --bg-color: #f0fdf4;
        }
        
        body { font-family: 'Nanum Gothic', sans-serif; background-color: var(--bg-color); margin: 0; padding: 15px; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 850px; background: white; padding: 25px; border-radius: 35px; border: 8px solid #dcfd8b; box-shadow: 0 10px 20px rgba(0,0,0,0.03); }
        
        .header { display: flex; flex-direction: column; align-items: center; margin-bottom: 20px; gap: 15px; }
        
        .user-tabs { display: flex; gap: 8px; width: 100%; }
        .tab-btn { flex: 1; padding: 12px; font-family: 'Dongle', sans-serif; font-size: 28px; border: 3px solid #f1f5f9; background: white; border-radius: 20px; cursor: pointer; transition: 0.2s; outline: none; }
        .tab-btn.active { background: var(--primary-color); border-color: #7dd3fc; color: #0369a1; }
        
        .status-row { width: 100%; display: flex; justify-content: space-between; align-items: center; background: #fff9db; padding: 10px 20px; border-radius: 20px; border: 2px dashed #fcd34d; }
        .coin-box { font-family: 'Dongle', sans-serif; font-size: 34px; color: #d97706; }

        /* 📅 캘린더 높이 조절 (2주 분량에 맞춤) */
        #calendar { background: white; padding: 10px; border-radius: 25px; border: 4px solid #f1f5f9; margin-bottom: 25px; min-height: 250px; }
        .fc-toolbar-title { font-family: 'Dongle', sans-serif; font-size: 2em !important; }
        
        .event-completed { opacity: 0.5 !important; }
        .event-completed .fc-event-title, .event-completed .fc-event-main { 
            text-decoration: line-through !important; 
            text-decoration-color: rgba(0,0,0,0.6) !important;
            text-decoration-thickness: 2px !important;
        }

        .day-detail { background: #f0f9ff; padding: 25px; border-radius: 30px; border: 4px solid #e0f2fe; }
        .date-label { font-family: 'Dongle', sans-serif; font-size: 38px; color: #0369a1; text-align: center; margin-bottom: 15px; }
        .input-pill { display: flex; height: 60px; background: white; border-radius: 30px; border: 3px solid #bae6fd; overflow: hidden; align-items: stretch; margin-bottom: 15px; }
        
        select { width: 110px; border: none; background: #e0f2fe; padding-left: 15px; font-weight: bold; border-right: 3px solid #bae6fd; font-size: 16px; outline: none; }
        input[type="text"] { flex: 1; border: none; padding: 0 20px; font-size: 17px; outline: none; background: transparent; height: 100%; }
        .btn-add-homework { width: 100%; height: 60px; background: #38bdf8; color: white; border: none; border-radius: 30px; font-family: 'Dongle', sans-serif; font-size: 36px; cursor: pointer; transition: 0.2s; box-shadow: 0 4px #0ea5e9; }
        .btn-add-homework:active { transform: translateY(2px); box-shadow: 0 2px #0ea5e9; }

        .todo-list { list-style: none; padding: 0; margin-top: 20px; }
        .todo-card { display: flex; justify-content: space-between; align-items: center; padding: 15px; background: white; border-radius: 20px; margin-bottom: 10px; border: 2px solid #e2e8f0; }
        .todo-card.completed { background: #f1f5f9; }
        .todo-card.completed .todo-text { text-decoration: line-through; color: #94a3b8; }
        
        .badge { font-weight: bold; margin-right: 8px; }
        .todo-text { font-size: 17px; color: var(--text-color); font-weight: 500; }
        
        .btn-action-done { background: #4ade80; border: none; color: white; padding: 10px 18px; border-radius: 12px; font-weight: bold; cursor: pointer; }
        .btn-action-del { background: #fca5a5; border: none; color: white; padding: 10px 18px; border-radius: 12px; cursor: pointer; margin-left: 5px; }

        #mgmt-modal { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.3); z-index:9999; justify-content:center; align-items:center; }
        .modal-body { background:white; padding:30px; border-radius:35px; width:90%; max-width:320px; text-align:center; border: 6px solid #dcfd8b; }
        
        @media (max-width: 600px) {
            .todo-card { flex-direction: column; align-items: flex-start; gap: 10px; }
            .todo-btns { width: 100%; display: flex; justify-content: flex-end; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <div class="user-tabs">
            <button id="tab-c1" class="tab-btn active" onclick="switchUser('child1')">박준서</button>
            <button id="tab-c2" class="tab-btn" onclick="switchUser('child2')">박준수</button>
        </div>
        <div class="status-row">
            <div class="coin-box">칭찬 스티커 ✨ <span id="coin-val">0</span>개</div>
            <button onclick="checkAdminPin()" style="background:none; border:none; cursor:pointer; font-size:22px;">⚙️</button>
        </div>
    </div>

    <div id="calendar"></div>

    <div class="day-detail" id="day-area">
        <div class="date-label"><span id="target-date-display">오늘의 미션</span></div>
        <div class="input-pill">
            <select id="homework-type"><option value="school">학교</option><option value="academy">학원</option></select>
            <input type="text" id="homework-input" placeholder="무엇을 공부할까요?">
        </div>
        <button class="btn-add-homework" onclick="addHomework()">미션 등록 완료! 🐾</button>
        <ul id="homework-list" class="todo-list"></ul>
    </div>
</div>

<div id="mgmt-modal"><div class="modal-body">
    <h3 style="font-family:'Dongle'; font-size:45px; margin:0;">부모님 전용 ⚙️</h3>
    <input type="number" id="manual-coin-val" style="width:100%; padding:15px; margin:20px 0; border-radius:15px; border:2px solid #DDD; text-align:center; font-size:24px;">
    <div style="display:flex; gap:10px;">
        <button style="flex:1; background:#bae6fd; border:none; padding:15px; border-radius:15px; font-weight:bold; cursor:pointer;" onclick="updateCoins()">수정</button>
        <button style="flex:1; background:#fecaca; border:none; padding:15px; border-radius:15px; font-weight:bold; cursor:pointer;" onclick="resetCoins()">리셋</button>
    </div>
    <button style="width:100%; margin-top:15px; background:#f1f5f9; border:none; padding:10px; border-radius:15px;" onclick="closeAdmin()">닫기</button>
</div></div>

<script>
    // ⚠️ 아버님의 Firebase 주소를 꼭 다시 넣어주세요! (끝에 / 포함)
    const FIREBASE_URL = "https://homework-db-6c830-default-rtdb.firebaseio.com/"; 

    let currentUser = 'child1';
    let selectedDate = new Date().toLocaleDateString('sv-SE');
    let calendar;
    let allTodos = [];
    let currentCoins = 0;

    function checkAdminPin() {
        if(prompt("보안 번호를 입력하세요(1234)") === "1234") {
            document.getElementById('manual-coin-val').value = currentCoins;
            document.getElementById('mgmt-modal').style.display = 'flex';
        } else alert("비밀번호가 틀렸어요! ⚙️");
    }
    function closeAdmin() { document.getElementById('mgmt-modal').style.display = 'none'; }

    function switchUser(user) {
        currentUser = user;
        document.getElementById('tab-c1').classList.toggle('active', user === 'child1');
        document.getElementById('tab-c2').classList.toggle('active', user === 'child2');
        fetchData();
    }

    function updateCoins() {
        fetch(`${FIREBASE_URL}${currentUser}/coins.json`, { method:'PUT', body:document.getElementById('manual-coin-val').value }).then(()=> {closeAdmin(); fetchData();});
    }
    function resetCoins() {
        if(confirm('리셋할까요?')) fetch(`${FIREBASE_URL}${currentUser}/coins.json`, { method:'PUT', body:0 }).then(()=> {closeAdmin(); fetchData();});
    }

    function addHomework() {
        const input = document.getElementById('homework-input');
        if(!input.value.trim()) return;
        const data = { category:document.getElementById('homework-type').value, text:input.value.trim(), dueDate:selectedDate, completed:false };
        fetch(`${FIREBASE_URL}${currentUser}/todos.json`, { method:'POST', body:JSON.stringify(data) }).then(()=>{ input.value=''; fetchData(); });
    }

    function toggleStatus(id, current) {
        const next = !current;
        let coins = next ? currentCoins+1 : Math.max(0, currentCoins-1);
        Promise.all([
            fetch(`${FIREBASE_URL}${currentUser}/todos/${id}.json`, { method:'PATCH', body:JSON.stringify({completed:next}) }),
            fetch(`${FIREBASE_URL}${currentUser}/coins.json`, { method:'PUT', body:coins })
        ]).then(()=>fetchData());
    }

    function removeHomework(id) {
        const target = allTodos.find(t=>t.id===id);
        if(confirm('이 숙제를 지울까요?')) {
            if(target && target.completed) fetch(`${FIREBASE_URL}${currentUser}/coins.json`, { method:'PUT', body:Math.max(0, currentCoins-1) }).then(()=>sendDelete(id));
            else sendDelete(id);
        }
    }
    function sendDelete(id) { fetch(`${FIREBASE_URL}${currentUser}/todos/${id}.json`, { method:'DELETE' }).then(()=>fetchData()); }

    function fetchData() {
        fetch(`${FIREBASE_URL}${currentUser}.json`).then(r=>r.json()).then(data => {
            currentCoins = data ? data.coins || 0 : 0;
            allTodos = data && data.todos ? Object.keys(data.todos).map(k=>({ id:k, ...data.todos[k] })) : [];
            document.getElementById('coin-val').innerText = currentCoins;
            calendar.removeAllEvents();
            calendar.addEventSource(allTodos.map(t => ({ 
                title: t.text, 
                start: t.dueDate, 
                backgroundColor: t.category==='school'? '#fb923c':'#a78bfa',
                className: t.completed ? 'event-completed' : '' 
            })));
            renderList();
        });
    }

    function renderList() {
        const list = document.getElementById('homework-list'); list.innerHTML = '';
        const dayTasks = allTodos.filter(t=>t.dueDate === selectedDate);
        document.getElementById('target-date-display').innerText = `📅 ${selectedDate} 숙제 리스트`;
        if(dayTasks.length===0) { list.innerHTML='<li style="text-align:center; color:#9CA3AF; padding:20px;">야호! 아직 등록된 미션이 없어요 🎈</li>'; return; }
        dayTasks.forEach(t => {
            const li = document.createElement('li'); li.className = `todo-card ${t.completed?'completed':''}`;
            li.innerHTML = `<div><span style="font-weight:bold; color:${t.category==='school'?'#fb923c':'#a78bfa'};">[${t.category==='school'?'학교':'학원'}]</span> <span class="todo-text">${t.text}</span></div>
                <div class="todo-btns"><button class="btn-action-done" onclick="toggleStatus('${t.id}',${t.completed})">${t.completed?'취소':'완료'}</button>
                <button class="btn-action-del" onclick="removeHomework('${t.id}')">삭제</button></div>`;
            list.appendChild(li);
        });
    }

    document.addEventListener('DOMContentLoaded', function() {
        calendar = new FullCalendar.Calendar(document.getElementById('calendar'), {
            // ⭐ 2주 단위 보기로 변경 적용 완료!
            initialView: 'dayGrid',
            views: {
                dayGrid: {
                    duration: { weeks: 2 }
                }
            },
            locale: 'ko',
            height: 'auto',
            headerToolbar: { left: 'prev,next today', center: 'title', right: '' },
            dateClick: function(info) {
                document.querySelectorAll('.fc-daygrid-day').forEach(el=>el.style.backgroundColor='');
                info.dayEl.style.backgroundColor='#fff9db'; selectedDate = info.dateStr; renderList();
            }
        });
        calendar.render(); fetchData(); setInterval(fetchData, 8000);
    });
</script>
</body>
</html>
